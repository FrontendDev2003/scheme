<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Масоны Самсона</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Масоны Самсона</h1>

<div class="canvas">

    <!-- Блоки -->
    <div class="box" style="top:36px; left:20px;">Алликсаар</div>

    <div class="box" style="top:180px; left:180px;">
        Станислав<br>Клитотехнис
    </div>

    <div class="box" style="top:260px; left:300px;">
        Людмила<br>Водопласская
    </div>

    <div class="box" style="top:340px; left:300px;">
        Ольга Боргдорф
    </div>

    <div class="box" style="top:460px; left:300px;">
        Сергей Брус
    </div>

    <div class="box" style="top:520px; left:180px;">
        Игорь Зверёк
    </div>

    <div class="box" style="top:580px; left:180px;">
        Антон Строй
    </div>

    <!-- Правая часть -->
    <div class="box" style="top:40px; left:730px;">
        Ду Хаст<br>Вячеславович
    </div>

    <div class="box" style="top:120px; left:730px;">
        Анастасия Ширинкина
    </div>

    <div class="box" style="top:190px; left:730px;">
        Александр Троян
    </div>

    <div class="box" style="top:340px; left:730px;">
        Дмитрий Возигнуй
    </div>

    <div class="box" style="top:400px; left:730px;">
        Кристина Болтушкина
    </div>

    <div class="box" style="top:480px; left:730px;">
        Максим Висолькин
    </div>

    <!-- SVG линии -->
    <svg class="lines">

        <!-- Алликсаар → верхняя линия -->
        <line x1="280" y1="60" x2="730" y2="60"/>
        <line x1="280" y1="60" x2="288" y2="54" stroke="black" stroke-width="2"/>
        <line x1="280" y1="60" x2="288" y2="66" stroke="black" stroke-width="2"/>

        <!-- вниз от Алликсаар -->
        <line x1="140" y1="80" x2="140" y2="600"/>
        <line x1="140" y1="80" x2="134" y2="89" stroke="black" stroke-width="2"/>
        <line x1="140" y1="80" x2="146" y2="89" stroke="black" stroke-width="2"/>

        <!-- к Станислав -->
        <line x1="140" y1="210" x2="180" y2="210"/>

        <!-- Станислав → Александр -->
        <line x1="440" y1="210" x2="730" y2="210"/>
        <line x1="440" y1="210" x2="448" y2="204" stroke="black" stroke-width="2"/>
        <line x1="440" y1="210" x2="448" y2="216" stroke="black" stroke-width="2"/>

        <!-- Людмила ветка -->
        <line x1="260" y1="247" x2="260" y2="490"/>
        <line x1="260" y1="247" x2="254" y2="256" stroke="black" stroke-width="2"/>
        <line x1="260" y1="247" x2="266" y2="256" stroke="black" stroke-width="2"/>
        
        <!-- к Людмиле -->
        <line x1="260" y1="283" x2="300" y2="283" />

        <!-- к Ольге -->
        <line x1="260" y1="363" x2="300" y2="363" />

        <!-- к Сергею -->
        <line x1="260" y1="489" x2="300" y2="489" />

        <!-- Ольга → Дмитрий -->
        <line x1="560" y1="360" x2="730" y2="360"/>
        <line x1="560" y1="360" x2="568" y2="354" stroke="black" stroke-width="2"/>
        <line x1="560" y1="360" x2="568" y2="366" stroke="black" stroke-width="2"/>

        <!-- Дмитрий вертикаль -->
        <line x1="700" y1="360" x2="700" y2="500"/>

        <!-- Дмитрий вертикаль 2 -->
        <line x1="1020" y1="360" x2="1020" y2="500"/>

        <!-- От Максима -->
        <line x1="990" y1="500" x2="1020" y2="500"/>

        <!-- К Дмитрию -->
        <line x1="990" y1="360" x2="1020" y2="360"/>
        <line x1="990" y1="360" x2="998" y2="354" stroke="black" stroke-width="2"/>
        <line x1="990" y1="360" x2="998" y2="366" stroke="black" stroke-width="2"/>

        <!-- к Кристине -->
        <line x1="700" y1="420" x2="730" y2="420"/>

        <!-- к Максиму -->
        <line x1="700" y1="500" x2="730" y2="500"/>

        <!-- к Игорю -->
        <line x1="140" y1="540" x2="180" y2="540"/>

        <!-- к Антону -->
        <line x1="140" y1="600" x2="180" y2="600"/>

        <!-- к Ду Хаст -->
        <line x1="700" y1="60" x2="700" y2="60"/>

        <!-- к Анастасии -->
        <line x1="700" y1="60" x2="700" y2="150"/>

        <!-- к Анастасии (горизонтальная) -->
        <line x1="700" y1="149" x2="730" y2="149"/>

    </svg>

</div>

</body>
</html>
